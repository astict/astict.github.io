<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thomas Astic — Développeur Web</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app">

    <header id="header">
      <div class="brand">
        <div class="name">THOMAS ASTIC</div>
        <div class="role" id="roleLabel" data-fr="DÉVELOPPEUR WEB" data-en="WEB DEVELOPER" data-es="DESARROLLADOR WEB" data-sv="WEBBUTVECKLARE"> <span>DÉVELOPPEUR WEB</span></div>
      </div>

      <div class="navwrap">
        <nav class="navpill" id="navPill">
          <button class="icobtn" title="Accueil">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 L14.5 9.5 22 12 14.5 14.5 12 22 9.5 14.5 2 12 9.5 9.5 Z"/></svg>
              </button>
                    <button class="navitem" data-fr="PROJETS" data-en="PROJECTS" data-es="PROYECTOS" data-sv="PROJEKT" data-num="01"> <span class="lbl">PROJETS</span> <span class="num">01</span>
              </button>

              <button class="navitem" data-fr="À PROPOS" data-en="ABOUT" data-es="SOBRE MÍ" data-sv="OM MIG" data-num="02"> <span class="lbl">À PROPOS</span> <span class="num">02</span>
              </button>

              <button class="navitem" data-fr="COMPÉTENCES" data-en="SKILLS" data-es="HABILIDADES" data-sv="FÄRDIGHETER" data-num="03"> <span class="lbl">COMPÉTENCES</span> <span class="num">03</span>
              </button>

              <button class="navitem" data-fr="CONTACT" data-en="CONTACT" data-es="CONTACTO" data-sv="KONTAKT" data-num="04"> <span class="lbl">CONTACT</span> <span class="num">04</span>
              </button>
        </nav>
        <div class="miscpill" title="Son">
          <span class="dot" style="background:var(--accent)"></span>
          <span class="bar"></span>
        </div>
      </div>

      <div class="statuspill">
        <span id="statusLabel" data-fr="DISPONIBLE" data-en="AVAILABLE" data-es="DISPONIBLE" data-sv="TILLGÄNGLIG"> DISPONIBLE </span>
        <span class="dot pulse"></span>
      </div>
    </header>

    <div class="rail left">
      <div class="node top"></div>
      <div class="line"></div>
      <div class="node bottom"></div>
      <div class="ticks"><span></span><span></span><span></span><span></span></div>
    </div>
    <div class="rail right">
      <div class="node top"></div>
      <div class="line"></div>
      <div class="node bottom"></div>
      <div class="ticks"><span></span><span></span><span></span><span></span></div>
    </div>

    <div id="hint">déplace la souris pour faire pivoter la scène</div>

    <div id="dock">
      <button class="dockitem" data-fr="SAÉ & PROJETS" data-en="COURSEWORK" data-es="PROYECTOS" data-sv="PROJEKT">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7h6l2 2h10v10H3z"/></svg>
        <span class="lbl">SAÉ &amp; PROJETS</span>
      </button>
      
      <button class="dockitem" data-fr="WEB 3D" data-en="3D WEB" data-es="WEB 3D" data-sv="3D WEB">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2 21 7v10l-9 5-9-5V7z"/><path d="M3 7l9 5 9-5M12 12v9"/></svg>
        <span class="lbl">WEB 3D</span>
      </button>

      <button class="dockitem" data-fr="INTERFACES" data-en="INTERFACES" data-es="INTERFACES" data-sv="GRÄNSSNITT">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 13 4 4 13 4 13 13Z"/><path d="M12 12 20 20"/></svg>
        <span class="lbl">INTERFACES</span>
      </button>

      <button class="dockitem" data-fr="RÉSEAUX & SYSTÈME" data-en="NETWORKS & SYS" data-es="REDES Y SISTEMAS" data-sv="NÄTVERK & SYSTEM">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="5" cy="6" r="2"/><circle cx="19" cy="6" r="2"/><circle cx="12" cy="18" r="2"/><path d="M5 8v4h14V8M12 12v4"/></svg>
        <span class="lbl">RÉSEAUX &amp; SYSTÈME</span>
      </button>

      <button class="dockitem" data-fr="CV" data-en="RESUME" data-es="CURRÍCULUM" data-sv="CV">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2h9l3 3v17H6z"/><path d="M9 8h6M9 12h6M9 16h4"/></svg>
        <span class="lbl">CV</span>
      </button>

      <button class="dockitem" data-fr="BLOG" data-en="BLOG" data-es="BLOG" data-sv="BLOG">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h16v16H4z"/><path d="M8 9h8M8 13h8M8 17h4"/></svg>
        <span class="lbl">BLOG</span>
      </button>

      <button class="dockitem" data-fr="LAB" data-en="LAB" data-es="LAB" data-sv="LABB">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 2h6M10 2v7l-5.5 9.5A2 2 0 0 0 6.2 22h11.6a2 2 0 0 0 1.7-3.5L14 9V2"/></svg>
        <span class="lbl">LAB</span>
      </button>

    </div>

    <div id="clock">
      <span class="dot pulse" style="background:var(--accent)"></span>
      <span id="clockTime">--:--</span>
      <span id="clockZone">GMT</span>
    </div>

    <div id="cornerTools">
      <button class="circlebtn" id="themeBtn" title="Changer de thème">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>
      </button>
      <div class="langMenu">
        <button class="circlebtn" id="langBtn" title="Langue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="9"/>
            <path d="M3 12h18M12 3a13 13 0 0 1 0 18M12 3a13 13 0 0 0 0 18"/>
          </svg>
        </button>

        <div id="langDropdown">
          <button data-lang="fr">
              <img src="model/flag/fr.svg" alt="Français" class="flag-icon"> Français
          </button>

          <button data-lang="en">
              <img src="model/flag/gb.svg" alt="English" class="flag-icon"> English
          </button>

          <button data-lang="es">
              <img src="model/flag/es.svg" alt="Español" class="flag-icon"> Español
          </button>

          <button data-lang="sv">
              <img src="model/flag/se.svg" alt="Svenska" class="flag-icon"> Svenska
          </button>
        </div>
      </div>
    </div>

    <div id="loader">
      <div class="label" id="loaderLabel">CHARGEMENT DES MODÈLES… 0%</div>
      <div class="bar-track"><div class="bar-fill" id="loaderBar"></div></div>
      <div class="error" id="loaderError"></div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
