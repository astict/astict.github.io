<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Portfolio 3D de Thomas Astic — Développeur Web, étudiant BUT Informatique." />
  <title>Thomas Astic — Portfolio</title>
  
  <script>
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme) {
      document.documentElement.setAttribute("data-theme", savedTheme);
    } else {
      document.documentElement.setAttribute("data-theme", "dark");
    }
  </script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app">

    <header id="header">
      <div class="brand">
        <div class="name">THOMAS ASTIC</div>
        <div class="role" id="roleLabel" data-fr="DÉVELOPPEUR WEB" data-en="WEB DEVELOPER" data-es="DESARROLLADOR WEB" data-sv="WEBBUTVECKLARE"> <span>DÉVELOPPEUR WEB</span></div>
      </div>

      <div class="navwrap">
        <nav class="navpill" id="navPill">
              <button class="icobtn" title="Accueil" aria-label="Accueil">
              <span class="wheel-icon" aria-hidden="true"></span>
              </button>
              
              <button class="navitem" data-fr="PROJETS" data-en="PROJECTS" data-es="PROYECTOS" data-sv="PROJEKT" data-num="01"> <span class="lbl">PROJETS</span> <span class="num">01</span>
              </button>

              <button class="navitem" data-fr="À PROPOS" data-en="ABOUT" data-es="SOBRE MÍ" data-sv="OM MIG" data-num="02"> <span class="lbl">À PROPOS</span> <span class="num">02</span>
              </button>

              <button class="navitem" data-fr="COMPÉTENCES" data-en="SKILLS" data-es="HABILIDADES" data-sv="FÄRDIGHETER" data-num="03"> <span class="lbl">COMPÉTENCES</span> <span class="num">03</span>
              </button>

              <button class="navitem" data-fr="CONTACT" data-en="CONTACT" data-es="CONTACTO" data-sv="KONTAKT" data-num="04"> <span class="lbl">CONTACT</span> <span class="num">04</span>
              </button>
        </nav>
      </div>

      <div class="statuspill">
        <span id="statusLabel" data-fr="DISPONIBLE" data-en="AVAILABLE" data-es="DISPONIBLE" data-sv="TILLGÄNGLIG"> DISPONIBLE </span>
        <span class="dot pulse"></span>
      </div>
    </header>

    <div class="rail left">
      <div class="node top"></div>
      <div class="line"></div>
      <div class="node bottom"></div>
      <div class="ticks"><span></span><span></span><span></span><span></span></div>
    </div>
    <div class="rail right">
      <div class="node top"></div>
      <div class="line"></div>
      <div class="node bottom"></div>
      <div class="ticks"><span></span><span></span><span></span><span></span></div>
    </div>

    <div id="hint">Faites pivoter la scène au gré de vos mouvements de souris.</div>

    <div id="dock">
      <button class="dockitem" data-cat="projets" data-fr="JEUX VIDÉO (UE5)" data-en="VIDEO GAMES (UE5)" data-es="VIDEOJUEGOS (UE5)" data-sv="TV-SPEL (UE5)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="6" width="20" height="12" rx="2"/>
          <path d="M6 12h4M8 10v4M15 11h.01M18 13h.01"/>
        </svg>
        <span class="lbl">JEUX VIDÉO</span>
      </button>
      
      <button class="dockitem" data-cat="projets" data-fr="SITES WEB" data-en="WEBSITES" data-es="SITIOS WEB" data-sv="WEBBPLATSER">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 2a14.5 14.5 0 0 0 0 20M12 2a14.5 14.5 0 0 1 0 20M2 12h20"/>
        </svg>
        <span class="lbl">SITES WEB</span>
      </button>

      <button class="dockitem" data-cat="projets" data-fr="SAÉ & ACADÉMIQUE" data-en="COURSEWORK" data-es="PROYECTOS ACAD." data-sv="AKADEMISKA PROJ.">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
          <path d="M6 12v5c0 2 2.5 3 6 3s6-1 6-3v-5"/>
        </svg>
        <span class="lbl">SAÉ & ACADÉMIQUE</span>
      </button>

      <button class="dockitem" data-cat="competences" data-fr="DÉVELOPPEMENT" data-en="DEVELOPMENT" data-es="DESARROLLO" data-sv="UTVECKLING">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 18 22 12 16 6"/>
          <polyline points="8 6 2 12 8 18"/>
        </svg>
        <span class="lbl">DÉVELOPPEMENT</span>
      </button>

      <button class="dockitem" data-cat="competences" data-fr="AUDIOVISUEL" data-en="AUDIOVISUAL" data-es="AUDIOVISUAL" data-sv="AUDIOVISUELL">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 7l-7 5 7 5V7z"/>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
        <span class="lbl">AUDIOVISUEL</span>
      </button>

      <button class="dockitem" data-cat="competences" data-fr="RÉSEAUX & SYSTÈME" data-en="NETWORKS & SYS" data-es="GN REDES Y SIS" data-sv="NÄTVERK & SYS">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="16" y="16" width="6" height="6" rx="1"/>
          <rect x="2" y="16" width="6" height="6" rx="1"/>
          <rect x="9" y="2" width="6" height="6" rx="1"/>
          <path d="M12 8v4M5 16v-4h14v4"/>
        </svg>
        <span class="lbl">RÉSEAUX & SYSTÈME</span>
      </button>

      <button class="dockitem" data-cat="apropos" data-fr="PARCOURS" data-en="MY JOURNEY" data-es="MI HISTORIA" data-sv="MIN RESA">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 18.72a6 6 0 0 0-3.44-4.53M22 22a9 9 0 0 0-10-8.79M7 14H2v-3.5a3.5 3.5 0 0 1 7 0V14z"/>
          <circle cx="12" cy="6" r="4"/>
        </svg>
        <span class="lbl">PARCOURS</span>
      </button>

      <button class="dockitem" data-cat="apropos" data-fr="LAB 3D" data-en="3D LAB" data-es="LAB 3D" data-sv="3D LABB">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16.04a2 2 0 0 1-1 1.73l-7 4a2 2 0 0 1-2 0l-7-4a2 2 0 0 1-1-1.73V7.96a2 2 0 0 1 1-1.73l7-4a2 2 0 0 1 2 0l7 4a2 2 0 0 1 1 1.73z"/>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
          <line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
        <span class="lbl">LAB 3D</span>
      </button>

      <button class="dockitem" data-cat="apropos" data-fr="MON CV" data-en="RESUME" data-es="MI CV" data-sv="MITT CV">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        <span class="lbl">MON CV</span>
      </button>

      <button class="dockitem" data-cat="contact" data-fr="RÉSEAUX" data-en="SOCIALS" data-es="RÉDES" data-sv="SOCIALA MEDIER">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
        </svg>
        <span class="lbl">RÉSEAUX</span>
      </button>

      <button class="dockitem" data-cat="contact" data-fr="TIKTOK (10K)" data-en="TIKTOK (10K)" data-es="TIKTOK (10K)" data-sv="TIKTOK (10K)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/>
          <circle cx="6" cy="18" r="3"/>
          <circle cx="18" cy="16" r="3"/>
        </svg>
        <span class="lbl">SHORT EDITS</span>
      </button>

      <button class="dockitem" data-cat="contact" data-fr="EMAIL" data-en="EMAIL" data-es="CORREO" data-sv="E-POST">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        <span class="lbl">EMAIL</span>
      </button>
    </div>

    <div id="clock">
      <span class="dot pulse" style="background:var(--accent)"></span>
      <span id="clockTime">--:--</span>
      <span id="clockZone">GMT</span>
    </div>

    <div id="cornerTools">
      <button class="circlebtn theme-toggle" id="themeBtn" title="Changer de thème" aria-label="Changer de thème">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>
      </button>
      <div class="langMenu">
        <button class="circlebtn" id="langBtn" title="Langue" aria-label="Changer de langue" aria-haspopup="true" aria-expanded="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="9"/>
            <path d="M3 12h18M12 3a13 13 0 0 1 0 18M12 3a13 13 0 0 0 0 18"/>
          </svg>
        </button>

        <div id="langDropdown">
          <button data-lang="fr">
              <span class="flag-wrap"><img src="model/flag/fr.webp" alt="Français" class="flag-icon"></span> Français
          </button>

          <button data-lang="en">
              <span class="flag-wrap"><img src="model/flag/gb.svg" alt="English" class="flag-icon"></span> English
          </button>

          <button data-lang="es">
              <span class="flag-wrap"><img src="model/flag/es.svg" alt="Español" class="flag-icon"></span> Español
          </button>

          <button data-lang="sv">
              <span class="flag-wrap"><img src="model/flag/se.svg" alt="Svenska" class="flag-icon"></span> Svenska
          </button>
        </div>
      </div>
    </div>

    <div id="loader">
      <div class="label" id="loaderLabel">CHARGEMENT DES MODÈLES… 0%</div>
      <div class="bar-track"><div class="bar-fill" id="loaderBar"></div></div>
      <div class="error" id="loaderError"></div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
